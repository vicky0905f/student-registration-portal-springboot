<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/stuedit.css}">
    <title>register</title>
</head>
<body>
<header>
    <a class="logo">Data Sticks..</a>
    <nav>
        <ul class="nav_links">
            <li><a href="/">Home</a></li>
            <li><a href="about">About</a></li>
            <li><a href="#">contact us</a></li>
            <li><a href="registered_data">Registered data</a> </li>
        </ul>
    </nav>
</header>
<div class="container">
    <div class="card">
        <h2>Edit Area</h2>
<form class="form" th:action="@{/save}" method="post" th:object="${student}">
    <input type="hidden" name="id" th:value="${student.id}">



    <label>Registered Id:
        <input type="text" name="regId" th:value="${student.regId}">
    </label><br>

    <label >Student name:
        <input type="text" name="studentName" th:value="${student.studentName}"></label> <br>

    <label>Student age:
        <input type="number" name="age" th:value="${student.age}"></label><br>

    <label>Department:
        <input type="text" name="department" th:value="${student.department}">
    </label><br>

    <label >CGPA:
        <input type="number"  step="0.01" name="cgpa" th:value="${student.cgpa}"><br></label>

    <button type="submit"> Submit</button>
   

</form>
 </div>
</div>
</body>
<footer>Data sticks portal a complete open source all rights received </footer>
</html>
