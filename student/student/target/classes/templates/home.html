    <div class="card">
        <h2>Student register portal</h2>
        <form class="form" th:action="@{/save}" method="post">

        <label>Registered Id:
             <input type="text" name="regId">
             </label><br>

        <label >Student name:
            <input type="text" name="studentName"></label> <br>

        <label>Student age:
            <input type="number" name="age"></label><br>

        <label>Department:
            <input type="text" name="department">
        </label><br>

        <label >CGPA:
            <input type="number"  step="0.01" name="cgpa"><br></label>

        <button type="submit">Submit</button>
    </form>
